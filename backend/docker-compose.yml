services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: uplink-ai-app
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
    depends_on:
      - postgres
    networks:
      - uplink-ai-net

  web:
    image: nginx:1.27-alpine
    container_name: uplink-ai-web
    ports:
      - "8000:80"
    volumes:
      - ./laravel:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - uplink-ai-net

  postgres:
    image: postgres:16-alpine
    container_name: uplink-ai-postgres
    environment:
      POSTGRES_DB: uplink_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      TZ: Asia/Tokyo
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - uplink-ai-net

  frontend:
    build:
      context: ../frontend
    container_name: uplink-frontend
    working_dir: /app

    volumes:
      - ../frontend:/app
      - /app/node_modules

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

    command: >
      sh -c "
      if [ -f package.json ]; then
        npm install &&
        npm run dev -- --hostname 0.0.0.0;
      else
        tail -f /dev/null;
      fi
      "

    depends_on:
      - web

    networks:
      - uplink-ai-net

volumes:
  postgres-data:

networks:
  uplink-ai-net:
    driver: bridge